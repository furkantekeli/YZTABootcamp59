version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pt-network

  # ─── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pt-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/portfolio_tracker
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GNEWS_API_KEY: ${GNEWS_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pt-network

  # ─── React Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pt-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pt-network

volumes:
  postgres_data:
    driver: local

networks:
  pt-network:
    driver: bridge
